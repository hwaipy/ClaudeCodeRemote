services:
  ccr-app-local:
    container_name: ccr-app-local
    build:
      # context = ClaudeCodeRemote 仓库根 (上两级), Dockerfile 拷源码用
      context: ../..
      dockerfile: deploy/local-app/Dockerfile
    restart: unless-stopped
    ports:
      - "1885:1884"   # host 1885 (避开 systemd ccr-autotest 的 1884), 容器内 1884
    volumes:
      - ./data:/data           # db 持久化
      - ./workspace:/workspace # claude code 实际操作的目录
      # 复用 host 上 claude code 已经登录的凭据 (avoid 重新登录)
      - ${HOME}/.config/claude:/root/.config/claude:ro
    environment:
      CCR_TOKEN: ${CCR_TOKEN:?CCR_TOKEN must be set}
      CCR_HUB_URL: ${CCR_HUB_URL:?CCR_HUB_URL must be set, e.g. wss://vibe.qpqi.group}
      CCR_HUB_DEVICE_TOKEN: ${CCR_HUB_DEVICE_TOKEN:?must redeem on hub UI}
      CCR_HUB_APP_NAME: ${CCR_HUB_APP_NAME:-ClawDocker}
      # claude code 自己读环境变量, 这里透传. 留空 = 用默认 (官方 api).
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-}
      ANTHROPIC_AUTH_TOKEN: ${ANTHROPIC_AUTH_TOKEN:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-}
