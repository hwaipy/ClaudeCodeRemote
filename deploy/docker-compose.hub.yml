services:
  # 出墙代理 — 给 hub 容器 OAuth (Google/GitHub) 提供 GFW 直连. 同一 docker
  # network, hub 走 HTTPS_PROXY=http://mihomo:7890. 第一次启动从订阅 URL
  # 拉 config.yaml (./mihomo-data 持久化).
  mihomo:
    image: metacubex/mihomo:Alpha
    container_name: ccr-mihomo
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    volumes:
      - ./mihomo-data:/root/.config/mihomo
    entrypoint:
      - sh
      - -c
      - |
        set -e
        mkdir -p /root/.config/mihomo
        if [ ! -s /root/.config/mihomo/config.yaml ]; then
          echo "first-run: fetching mihomo subscription"
          wget -qO /root/.config/mihomo/config.yaml \
              "$$CCR_MIHOMO_SUB_URL" || { echo "sub fetch failed" >&2; exit 1; }
        fi
        exec /mihomo -d /root/.config/mihomo
    environment:
      CCR_MIHOMO_SUB_URL: "${CCR_MIHOMO_SUB_URL:-https://qpqi.group/advanced/Magic2082.yaml}"
    # 不暴露端口给 host (只让同 docker network 的 hub 访问 mihomo:7890)

  ccr-hub:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.hub
    container_name: ccr-hub
    restart: unless-stopped
    depends_on:
      - mihomo
    ports:
      - "1885:1885"
    environment:
      CCR_HUB_DB: /data/hub.db
      CCR_HUB_ADMIN_EMAIL: "${CCR_HUB_ADMIN_EMAIL:?must set}"
      CCR_HUB_ADMIN_PW: "${CCR_HUB_ADMIN_PW:?must set}"
      # 自身对外 URL (OAuth callback 用)
      CCR_HUB_ORIGIN: "${CCR_HUB_ORIGIN:-https://vibe.qpqi.group}"
      # 通过 mihomo 走墙 — Google / GitHub OAuth 等国际 endpoint 必经.
      # NO_PROXY 旁路: localhost / 同 docker network / 国内 LLM gateway.
      HTTP_PROXY: "http://mihomo:7890"
      HTTPS_PROXY: "http://mihomo:7890"
      NO_PROXY: "localhost,127.0.0.1,mihomo,ccr-mihomo,api.kimi.com,api.moonshot.cn,api.llm.ustc.edu.cn,gitee.com,passport.feishu.cn,open.feishu.cn,login.dingtalk.com,api.dingtalk.com"
      # OAuth — provider 的 client_id/secret 留空时该 provider 不启用 (前端
      # 不显示按钮). 配好任一个就出现对应"Sign in with X"按钮.
      CCR_HUB_OAUTH_GOOGLE_CLIENT_ID:       "${CCR_HUB_OAUTH_GOOGLE_CLIENT_ID:-}"
      CCR_HUB_OAUTH_GOOGLE_CLIENT_SECRET:   "${CCR_HUB_OAUTH_GOOGLE_CLIENT_SECRET:-}"
      CCR_HUB_OAUTH_GITHUB_CLIENT_ID:       "${CCR_HUB_OAUTH_GITHUB_CLIENT_ID:-}"
      CCR_HUB_OAUTH_GITHUB_CLIENT_SECRET:   "${CCR_HUB_OAUTH_GITHUB_CLIENT_SECRET:-}"
      CCR_HUB_OAUTH_GITEE_CLIENT_ID:        "${CCR_HUB_OAUTH_GITEE_CLIENT_ID:-}"
      CCR_HUB_OAUTH_GITEE_CLIENT_SECRET:    "${CCR_HUB_OAUTH_GITEE_CLIENT_SECRET:-}"
      CCR_HUB_OAUTH_FEISHU_CLIENT_ID:       "${CCR_HUB_OAUTH_FEISHU_CLIENT_ID:-}"
      CCR_HUB_OAUTH_FEISHU_CLIENT_SECRET:   "${CCR_HUB_OAUTH_FEISHU_CLIENT_SECRET:-}"
      CCR_HUB_OAUTH_DINGTALK_CLIENT_ID:     "${CCR_HUB_OAUTH_DINGTALK_CLIENT_ID:-}"
      CCR_HUB_OAUTH_DINGTALK_CLIENT_SECRET: "${CCR_HUB_OAUTH_DINGTALK_CLIENT_SECRET:-}"
    volumes:
      - ./data:/data
