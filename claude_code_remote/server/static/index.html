<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover,interactive-widget=resizes-content">
<meta name="theme-color" content="#0e1117">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CCR">
<!-- 反代场景下 __ROOT__ 会被 server 替换为 /remote 等前缀；本地直跑就是空 -->
<base href="__ROOT__/">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<link rel="icon" type="image/png" sizes="192x192" href="static/icon-192.png">
<link rel="apple-touch-icon" href="static/apple-touch-icon.png">
<title>ClaudeCodeRemote</title>
<link rel="stylesheet" href="static/lib/katex/katex.min.css?v=__BUILD_ID__">
<link rel="stylesheet" href="static/style.css?v=__BUILD_ID__">
</head>
<body>

<!-- 登录 -->
<div class="view" id="view-login">
  <div class="center-wrap">
    <div class="card">
      <h1>ClaudeCodeRemote</h1>
      <label for="login-token">Bearer Token</label>
      <input id="login-token" type="password" autocomplete="current-password" placeholder="CCR_TOKEN">
      <button class="btn btn-primary btn-block" id="login-go">Sign in</button>
      <div class="err" id="login-err"></div>
      <div class="hint">Token is set via the server env var <span class="kbd">CCR_TOKEN</span>.</div>
    </div>
  </div>
</div>

<!-- 会话列表 / 新建 -->
<div class="view" id="view-home">
  <div class="center-wrap">
    <div class="card">
      <div class="home-top">
        <button class="icon-btn" id="settings-btn" type="button" title="Settings" aria-label="Settings">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33h0a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51h0a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82v0a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
          </svg>
        </button>
        <button class="icon-btn" id="new-btn" type="button" title="New session" aria-label="New session">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
        </button>
        <div id="search-bar" class="search-bar" role="search">
          <button id="search-btn" type="button" class="search-bar-icon" title="Search sessions" aria-label="Search">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <circle cx="11" cy="11" r="7"></circle>
              <line x1="21" y1="21" x2="16.5" y2="16.5"></line>
            </svg>
          </button>
          <input id="search-input" type="text" placeholder="Search by name…" autocomplete="off">
          <button id="search-clear" type="button" class="search-clear" title="Close search" aria-label="Close search">✕</button>
        </div>
      </div>

      <div id="sessions-active">
        <h2 class="section-label">
          <span class="section-label-text">Active</span>
          <button id="sessions-sort" type="button" class="sort-btn" data-mode="created" title="Sort by creation date — click to switch to last-active" aria-label="Sort">
            <svg class="sort-icon-created" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <rect x="4" y="6" width="16" height="14" rx="2"/>
              <line x1="4" y1="10" x2="20" y2="10"/>
              <line x1="8" y1="4" x2="8" y2="8"/>
              <line x1="16" y1="4" x2="16" y2="8"/>
            </svg>
            <svg class="sort-icon-active" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <circle cx="12" cy="12" r="8"/>
              <line x1="12" y1="12" x2="12" y2="7"/>
              <line x1="12" y1="12" x2="15.5" y2="14"/>
            </svg>
          </button>
        </h2>
        <div class="session-list" id="session-list-active">
          <div class="session-empty">Loading…</div>
        </div>
      </div>

      <div id="sessions-stash" class="expanded">
        <h2 class="stash-toggle section-label">
          <span class="chevron">▶</span>
          <span class="section-label-text">Stash</span>
          <span class="count"></span>
        </h2>
        <div class="session-list" id="session-list-stash"></div>
      </div>

      <div id="sessions-inactive">
        <h2 class="inactive-toggle section-label">
          <span class="chevron">▶</span>
          <span class="section-label-text">Inactive</span>
          <span class="count"></span>
        </h2>
        <div class="session-list" id="session-list-inactive"></div>
      </div>
    </div>
    <!-- Sticky footer: pushed to bottom of .center-wrap when content
         is short; trails after the card when sessions overflow. -->
    <div class="home-footer">
      <a href="#" id="logout">Sign out</a>
      <span class="sep">·</span>
      <a href="#" id="hard-reload">Hard reload</a>
    </div>
  </div>
</div>

<!-- 设置 -->
<div class="view" id="view-settings">
  <div class="settings-head">
    <button class="back" id="settings-back" type="button" title="Back" aria-label="Back">←</button>
    <div class="info">
      <div class="name">Settings</div>
    </div>
  </div>
  <div class="settings-body">
    <label for="settings-default-cwd">Default working directory</label>
    <div class="path-row">
      <input id="settings-default-cwd" type="text" placeholder="/abs/path">
      <button type="button" class="btn btn-secondary path-browse" id="settings-browse-btn">Browse…</button>
    </div>
    <label>Default permission</label>
    <div class="spawn-perm" id="settings-default-perm">
      <button type="button" class="spawn-perm-btn active" data-mode="manual">Ask</button>
      <button type="button" class="spawn-perm-btn" data-mode="accept_edits">Auto edits</button>
      <button type="button" class="spawn-perm-btn" data-mode="plan">Plan</button>
      <button type="button" class="spawn-perm-btn" data-mode="allow_all">Allow all</button>
    </div>
    <div class="settings-hint">These values pre-fill the new-session dialog.</div>
  </div>
</div>

<!-- 聊天 -->
<div class="chat-head" id="chat-head">
  <button class="back" id="chat-back" title="Back">←</button>
  <div class="info">
    <div class="name" id="chat-name"></div>
    <div class="meta" id="chat-meta"></div>
  </div>
  <span class="conn-dot" id="conn-dot" title="Network status"></span>
  <span class="status" id="chat-status"></span>
  <button class="chat-perm" id="chat-perm" type="button" title="Permission mode" aria-label="Permission mode" hidden>
    <svg class="perm-svg perm-svg-manual"   viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
      <path d="M7 11V8a5 5 0 0 1 10 0v3" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
      <rect x="5" y="11" width="14" height="9" rx="2" fill="none" stroke="currentColor" stroke-width="1.8"/>
      <circle cx="12" cy="15.5" r="1.2" fill="currentColor"/>
    </svg>
    <svg class="perm-svg perm-svg-allowall" viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
      <path d="M13.5 2.5 6 13h5.5l-1 8.5L18 11h-5.5l1-8.5z" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round"/>
    </svg>
  </button>
  <button class="chat-interrupt" id="chat-interrupt" type="button" title="Interrupt current session" aria-label="Interrupt" hidden>⏹</button>
</div>
<div class="perm-menu" id="perm-menu" hidden>
  <button class="perm-menu-item" data-mode="manual">
    <span class="perm-menu-icon perm-menu-icon-manual">
      <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
        <path d="M7 11V8a5 5 0 0 1 10 0v3" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        <rect x="5" y="11" width="14" height="9" rx="2" fill="none" stroke="currentColor" stroke-width="1.8"/>
        <circle cx="12" cy="15.5" r="1.2" fill="currentColor"/>
      </svg>
    </span>
    <span class="perm-menu-label">
      <span class="perm-menu-title">Ask each time</span>
      <span class="perm-menu-sub">Default — every tool call needs approval</span>
    </span>
    <span class="perm-menu-check">✓</span>
  </button>
  <button class="perm-menu-item" data-mode="accept_edits">
    <span class="perm-menu-icon">
      <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
        <path d="M12 20h9" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        <path d="M16.5 3.5a2.121 2.121 0 1 1 3 3L7 19l-4 1 1-4 12.5-12.5z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
      </svg>
    </span>
    <span class="perm-menu-label">
      <span class="perm-menu-title">Auto edits</span>
      <span class="perm-menu-sub">Auto-approve Edit/Write only</span>
    </span>
    <span class="perm-menu-check">✓</span>
  </button>
  <button class="perm-menu-item" data-mode="plan">
    <span class="perm-menu-icon">
      <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
        <path d="M12 3l9 4.5v9L12 21 3 16.5v-9L12 3z" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
      </svg>
    </span>
    <span class="perm-menu-label">
      <span class="perm-menu-title">Plan only</span>
      <span class="perm-menu-sub">No tool execution, plan-only</span>
    </span>
    <span class="perm-menu-check">✓</span>
  </button>
  <button class="perm-menu-item" data-mode="allow_all">
    <span class="perm-menu-icon perm-menu-icon-allowall">
      <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
        <path d="M13.5 2.5 6 13h5.5l-1 8.5L18 11h-5.5l1-8.5z" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round"/>
      </svg>
    </span>
    <span class="perm-menu-label">
      <span class="perm-menu-title">Allow all</span>
      <span class="perm-menu-sub">Auto-approve every tool call</span>
    </span>
    <span class="perm-menu-check">✓</span>
  </button>
</div>
<div class="view" id="view-chat">
  <!-- session 初次加载 overlay：放在 view-chat 内，swipe-back 会跟着滑出 -->
  <div class="chat-loading" id="chat-loading" hidden>
    <div class="chat-loading-spinner"></div>
  </div>
  <div class="chat">
    <div class="chat-log" id="chat-log"></div>
    <div class="history-loader" id="history-loader" hidden>
      <span class="history-spinner"></span><span class="history-text"></span>
    </div>
    <button class="scroll-to-bottom" id="scroll-to-bottom" type="button" aria-label="Scroll to latest" hidden>↓</button>
    <div class="conv-status" id="conv-status">
      <span class="cs-spark" id="cs-dot" aria-hidden="true">✶</span>
      <span class="cs-tokens" id="cs-tokens">↓0</span>
      <span class="cs-time" id="cs-time">0s</span>
      <span class="cs-ctx" id="cs-ctx"></span>
    </div>
    <div class="chat-attachments" id="chat-attachments" hidden></div>
    <div class="chat-foot">
      <input id="att-input" type="file" multiple hidden>
      <textarea id="chat-input" rows="1" enterkeyhint="send"></textarea>
      <button class="btn-att" id="chat-att" type="button" title="Add attachment" aria-label="Add attachment">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round">
          <line x1="12" y1="5" x2="12" y2="19"></line>
          <line x1="5" y1="12" x2="19" y2="12"></line>
        </svg>
      </button>
    </div>
  </div>
</div>

<!-- New session modal -->
<div class="modal-bg" id="modal-new-session" hidden>
  <div class="modal">
    <div class="modal-head">
      <div class="modal-title">New session</div>
      <button class="modal-x" id="new-modal-close" type="button">×</button>
    </div>
    <div class="modal-body">
      <label for="spawn-name">Name (optional)</label>
      <input id="spawn-name" type="text" placeholder="e.g. debug logs">
      <label for="spawn-cwd">Working directory</label>
      <div class="path-row">
        <input id="spawn-cwd" type="text" placeholder="/abs/path">
        <button type="button" class="btn btn-secondary path-browse" id="browse-btn">Browse…</button>
      </div>
      <div class="chips" id="cwd-presets"></div>
      <label>Permission mode</label>
      <div class="spawn-perm" id="spawn-perm">
        <button type="button" class="spawn-perm-btn active" data-mode="manual">Ask</button>
        <button type="button" class="spawn-perm-btn" data-mode="accept_edits">Auto edits</button>
        <button type="button" class="spawn-perm-btn" data-mode="plan">Plan</button>
        <button type="button" class="spawn-perm-btn" data-mode="allow_all">Allow all</button>
      </div>
      <div class="err" id="spawn-err"></div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-secondary" id="new-modal-cancel" type="button">Cancel</button>
      <button class="btn btn-primary" id="spawn-go" type="button">Start</button>
    </div>
  </div>
</div>

<!-- 目录浏览 modal -->
<div class="modal-bg" id="modal-browse" hidden>
  <div class="modal">
    <div class="modal-head">
      <div class="crumb mono" id="modal-crumb"></div>
      <button class="modal-x" id="modal-close" type="button">×</button>
    </div>
    <div class="modal-list" id="modal-list"></div>
    <div class="modal-foot">
      <button class="modal-iconbtn" id="modal-newdir" type="button" title="New folder" aria-label="New folder">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7z"/>
          <line x1="12" y1="11" x2="12" y2="17"/>
          <line x1="9"  y1="14" x2="15" y2="14"/>
        </svg>
      </button>
      <button class="btn btn-secondary" id="modal-cancel" type="button">Cancel</button>
      <button class="btn btn-primary"   id="modal-confirm" type="button">Use this</button>
    </div>
  </div>
</div>

<script src="static/lib/marked.min.js?v=__BUILD_ID__"></script>
<script src="static/lib/katex/katex.min.js?v=__BUILD_ID__"></script>
<script src="static/lib/katex/contrib/auto-render.min.js?v=__BUILD_ID__"></script>
<script src="static/app.js?v=__BUILD_ID__"></script>
</body>
</html>
