[pytest]
testpaths = tests/e2e tests/hub tests/integration
python_files = test_*.py
norecursedirs = scripts docs deploy .venv
addopts = -v --tb=short --strict-markers
markers =
    slow: tests that take more than a few seconds
    spec_only: tests that encode spec items not yet implemented (expected to fail until code catches up)
    anyio: anyio-style async test
